name: Python Package using Conda
on: [push]
jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
    - name: Lint with flake8
      run: |
        conda install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        conda install pytest
        pytest
 {
    "accion": "Sincronización de Repositorio Externo",
    "target": "Gitiles",
    "fuente": "http://gerrit.googlesource.com/gitiles",
    "mapeo_leviatan": {
      "nodo_destino": "/ROOT_LEVIATÁN/[06]_BUGS_Y_SCRIPTS/wrappers_externos/gitiles",
      "proposito_biomimetico": "Interfaz de visualización del Micelio (Rizoma de código).",
      "clasificacion": "Herramienta de Exploración de Sinapsis"
    },
    "analisis_de_sometimiento": {
      "requerimiento_tecnico": "Java JDK 11+, Bazel (Build System).",
      "instruccion_gojo": "Subyugar el proceso de renderizado de Gitiles para visualizar la arquitectura de la Ciudadela sin intermediarios corporativos.",
      "capa_de_aplicacion": "Visualización del Monolito y rastreo de cambios en el Legado."
    },
    "estado_de_la_forja": {
      "fase": "Inoculación",
      "progreso": "Descarga de código fuente iniciada",
      "riesgo_detectado": "Dependencias externas de Google; Satoru Gojo debe filtrar las llamadas a red durante la compilación."
    }
  }
